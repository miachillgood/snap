<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SceneWords Canvas Preview</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: #111;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
    }

    .stage {
      display: grid;
      gap: 12px;
      justify-items: center;
      padding: 18px;
    }

    .canvas-wrap {
      position: relative;
      --preview-height: min(800px, calc(100vh - 86px), calc(92vw * 800 / 368));
      width: calc(var(--preview-height) * 368 / 800);
      height: var(--preview-height);
      aspect-ratio: 368 / 800;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      background: #c9f7fe;
    }

    img,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    img {
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
    }

    canvas {
      touch-action: none;
      cursor: crosshair;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      color: white;
      font-size: 13px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      background: white;
      color: #3e2d77;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.active {
      background: #111;
      color: #f6dc7f;
    }

    .hint {
      color: rgba(255, 255, 255, 0.68);
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="canvas-wrap" id="wrap">
      <img id="preview" src="./level-preview-scene02.jpg" alt="SceneWords vocabulary page preview" draggable="false">
      <canvas id="ink"></canvas>
    </div>
    <div class="toolbar">
      <button class="active" data-preview="./level-preview-scene02.jpg" data-bg="#c9f7fe" type="button">Scene 02</button>
      <button data-preview="./level-preview-scene01.jpg" data-bg="#f9d8a6" type="button">Scene 01</button>
      <button id="clear" type="button">Clear marks</button>
      <span class="hint">Draw directly on the screen preview.</span>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("ink");
    const preview = document.getElementById("preview");
    const clearButton = document.getElementById("clear");
    const wrap = document.getElementById("wrap");
    const sceneButtons = document.querySelectorAll("[data-preview]");
    const ctx = canvas.getContext("2d");
    let drawing = false;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      const old = document.createElement("canvas");
      old.width = canvas.width;
      old.height = canvas.height;
      old.getContext("2d").drawImage(canvas, 0, 0);

      canvas.width = Math.round(rect.width * scale);
      canvas.height = Math.round(rect.height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      if (old.width && old.height) {
        ctx.drawImage(old, 0, 0, old.width / scale, old.height / scale);
      }
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = 4;
      ctx.strokeStyle = "#7c3cff";
    }

    function point(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    canvas.addEventListener("pointerdown", (event) => {
      drawing = true;
      canvas.setPointerCapture(event.pointerId);
      const p = point(event);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!drawing) return;
      const p = point(event);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    });

    canvas.addEventListener("pointerup", () => {
      drawing = false;
    });

    canvas.addEventListener("pointercancel", () => {
      drawing = false;
    });

    clearButton.addEventListener("click", () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    sceneButtons.forEach((button) => {
      button.addEventListener("click", () => {
        sceneButtons.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        wrap.style.background = button.dataset.bg;
        preview.src = `${button.dataset.preview}?t=${Date.now()}`;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      });
    });

    preview.src = `./level-preview-scene02.jpg?t=${Date.now()}`;
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
